name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: pip install -r requirements-test.txt
      - name: Run tests
        run: pytest tests/ --cov=custom_components/phoenixcontact_charx --cov-report=term-missing
